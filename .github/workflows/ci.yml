name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Check
        run: PATH="/usr/bin:$PATH" cargo check --workspace
      - name: Test
        run: PATH="/usr/bin:$PATH" cargo test --workspace

  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Build WASM
        run: cargo build --target wasm32-unknown-unknown -p rebellion-app --release
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: open-rebellion-wasm
          path: target/wasm32-unknown-unknown/release/rebellion-app.wasm
