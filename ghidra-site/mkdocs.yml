site_name: "Open Rebellion — Ghidra RE"
site_description: "Reverse engineering documentation for Star Wars Rebellion (1998, LucasArts)"
site_url: "https://tdimino.github.io/open-rebellion/"
repo_url: "https://github.com/tdimino/open-rebellion"
repo_name: "tdimino/open-rebellion"

theme:
  name: material
  palette:
    - scheme: slate
      primary: amber
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: default
      primary: amber
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - admonition
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

plugins:
  - search

nav:
  - Home: index.md
  - Scholar Documents:
    - Annotated Functions: scholar/annotated-functions.md
    - C++ Class Hierarchy: scholar/cpp-class-hierarchy.md
    - Entity System: scholar/entity-system.md
    - Economy Systems: scholar/economy-systems.md
    - Mission & Event Cookbook: scholar/mission-event-cookbook.md
    - Modders Taxonomy: scholar/modders-taxonomy.md
    - Rust Implementation Guide: scholar/rust-implementation-guide.md
    - AI Behavior Analysis: scholar/ai-behavior-analysis.md
    - COMMON.DLL Analysis: scholar/common-dll-analysis.md
  - Combat:
    - Space Combat Pipeline: combat/space-combat.md
    - Ground Combat: combat/ground-combat.md
    - Bombardment Formula: combat/bombardment.md
    - Combat Formulas: combat/combat-formulas.md
    - Combat Summary: combat/COMBAT-SUMMARY.md
  - Setup & Workflow: setup.md
  - Expansions:
    - Homeworld Expansion: expansions/homeworld.md
    - Total Conversions & Eras: expansions/total-conversions.md
  - Indexes:
    - Function Index (5,127): indexes/function-index.md
    - Notes Index: indexes/notes-index.md
  - Game Guide:
    - The Galactic Civil War: guide/scenario.md
    - Factions: guide/factions.md
    - Characters & Officers: guide/characters.md
    - The Galaxy: guide/galactic-map.md
    - Building Your War Machine: guide/economy.md
    - Research & Tech Trees: guide/tech-trees.md
    - Fleets & Combat: guide/fleets-and-combat.md
    - Missions: guide/missions.md
    - Victory & Defeat: guide/winning.md
